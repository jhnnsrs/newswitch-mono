name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --dev
      - run: uv run pytest -k "not integration"

  backend-coverage:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run pytest --cov --cov-branch --cov-report=xml
      - uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: backend

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile

      # Blocking. Both gates used to be dead - `types` pointed at a solution tsconfig with
      # `files: []` so it checked ZERO files, and no CI ever ran eslint - which hid 165 type
      # errors and 90 lint problems. The backlog is cleared; keep it that way.
      - run: yarn lint
      - run: yarn types

      - run: yarn test

      # No backend in CI: the vite plugin warns on failed schema fetches and reuses the
      # committed blok.json + src/apps/default/**. A green build here therefore also
      # asserts those generated files are present and coherent in git.
      - run: yarn build

  # The frontend is GENERATED from the running backend, and the generator fails SILENTLY
  # (fetch errors are warnings; it falls back to the committed output). So committed hooks
  # can drift away from the backend with nothing to catch it. This job boots the real
  # backend, regenerates, and fails if the result differs from what is committed.
  # It only works because both halves live in one repo at one commit.
  codegen-drift:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: uv sync --all-extras --dev
        working-directory: backend
      - run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Boot the backend
        run: uv run uvicorn main:app --host 127.0.0.1 --port 8099 &
        working-directory: backend

      - name: Wait for the schema endpoints
        run: |
          for _ in $(seq 1 60); do
            curl -sf http://localhost:8099/schemas/states >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "backend never came up" >&2
          exit 1

      - name: Regenerate
        run: yarn build
        working-directory: frontend

      - name: Fail if the committed codegen is stale
        run: |
          if ! git diff --quiet -- frontend/src/apps frontend/blok.json; then
            echo "::error::Generated frontend code does not match the backend."
            git diff --stat -- frontend/src/apps frontend/blok.json
            git diff -- frontend/src/apps frontend/blok.json | head -100
            exit 1
          fi
          echo "Generated code matches the backend."

  ci-ok:
    # One required status check that still passes when path filters skip a job
    if: always()
    needs: [backend-test, backend-coverage, frontend, codegen-drift]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "job results: $results"
          case "$results" in
            *failure*|*cancelled*) exit 1 ;;
          esac
