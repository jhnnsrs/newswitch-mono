name: Release Website

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            yarn install
          fi

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build website
        if: steps.semantic.outputs.new_release_published == 'true'
        run: yarn build

      - name: Validate semantic version tag
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          TAG_NAME: ${{ steps.semantic.outputs.new_release_git_tag }}
        run: |
          VERSION="${TAG_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Generated tag '$TAG_NAME' is not valid semantic versioning."
            exit 1
          fi

      - name: Create release archive
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          ZIP_NAME="blok.zip"
          (cd dist && zip -r "../$ZIP_NAME" .)
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Generate manifest metadata for release body
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          if [ ! -f blok.json ]; then
            echo "blok.json not found at repository root."
            exit 1
          fi

          GENERATED_AT="$(jq -r '.generatedAt // "n/a"' blok.json)"
          DEP_COUNT="$(jq -r '(.dependencies // []) | length' blok.json)"

          {
            echo "## Build blok metadata"
            echo
            echo "## Build metadata"
            echo "- Version: ${VERSION}"
            echo "- Generated at: ${GENERATED_AT}"
            echo "- Dependency count: ${DEP_COUNT}"
            echo
            echo "## Blok dependencies"
            jq -r '(.dependencies // []) | .[] | "- `\(.)`"' blok.json
            echo
          } > release-manifest-metadata.md

      - name: Upload release assets
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semantic.outputs.new_release_git_tag }}
          files: |
            ${{ env.ZIP_NAME }}
            blok.json

      - name: Append manifest metadata to release notes
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')
            const owner = context.repo.owner
            const repo = context.repo.repo
            const tag = `${{ toJSON(steps.semantic.outputs.new_release_git_tag) }}`.replace(/^"|"$/g, '')
            const metadata = fs.readFileSync('release-manifest-metadata.md', 'utf8')

            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
            const currentBody = release.data.body || ''

            if (currentBody.includes('## Build blok metadata')) {
              core.info('Blok metadata already present in release notes; skipping append.')
              return
            }

            const separator = currentBody.trim().length ? '\n\n---\n\n' : ''
            const body = `${currentBody}${separator}${metadata}`

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            })
